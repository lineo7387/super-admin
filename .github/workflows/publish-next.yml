name: Publish next

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type publish-super-admin-next-<version> to publish the current lockstep version to the next dist-tag.
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish-next:
    runs-on: ubuntu-latest
    env:
      SUPER_ADMIN_PUBLISH_WORKFLOW: publish-next.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Use modern npm for Trusted Publishing
        run: npm install -g npm@^11.10.0

      - name: Verify publish confirmation
        env:
          PUBLISH_CONFIRM: ${{ inputs.confirm }}
        run: node scripts/release.mjs assert-workflow-confirm "$PUBLISH_CONFIRM"

      - name: Install pnpm
        run: npm install -g pnpm@10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release check
        run: pnpm release check

      - name: Publish core
        run: npm publish packages/core --tag next --access public --provenance

      - name: Publish theme runtime
        run: npm publish packages/theme --tag next --access public --provenance

      - name: Publish base theme
        run: npm publish packages/theme-base --tag next --access public --provenance

      - name: Publish crypto theme
        run: npm publish packages/theme-crypto --tag next --access public --provenance

      - name: Publish cyberpunk theme
        run: npm publish packages/theme-cyberpunk --tag next --access public --provenance

      - name: Publish industrial theme
        run: npm publish packages/theme-industrial --tag next --access public --provenance

      - name: Publish newsprint theme
        run: npm publish packages/theme-newsprint --tag next --access public --provenance

      - name: Publish UI
        run: npm publish packages/ui --tag next --access public --provenance

      - name: Publish creator CLI
        run: npm publish packages/cli --tag next --provenance
