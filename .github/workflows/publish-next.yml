name: Publish next

on:
  workflow_dispatch:
    inputs:
      changed_packages:
        description: Comma-separated changed publish candidates. Dependents are added automatically, for example create-super-admin or @super-admin-org/core.
        required: true
      confirm:
        description: Type the confirmation printed by pnpm release plan --changed <packages>.
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish-next:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SUPER_ADMIN_PUBLISH_WORKFLOW: publish-next.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        run: npm install -g pnpm@10.33.0

      - name: Use Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Use modern npm for Trusted Publishing
        run: npm install -g npm@^11.10.0

      - name: Verify publish confirmation
        env:
          PUBLISH_CHANGED_PACKAGES: ${{ inputs.changed_packages }}
          PUBLISH_CONFIRM: ${{ inputs.confirm }}
        run: node scripts/release.mjs assert-workflow-confirm "$PUBLISH_CONFIRM" --changed "$PUBLISH_CHANGED_PACKAGES"

      - name: Verify package versions are unpublished
        timeout-minutes: 2
        env:
          PUBLISH_CHANGED_PACKAGES: ${{ inputs.changed_packages }}
        run: pnpm release assert-unpublished --changed "$PUBLISH_CHANGED_PACKAGES"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release check
        timeout-minutes: 15
        run: pnpm release check

      - name: Create publish plan
        id: publish-plan
        env:
          PUBLISH_CHANGED_PACKAGES: ${{ inputs.changed_packages }}
        run: |
          plan_json="$(node scripts/npm-registry-release-commands.mjs publish-next --changed "$PUBLISH_CHANGED_PACKAGES" --json)"
          echo "plan_json=$plan_json" >> "$GITHUB_OUTPUT"

      - name: Publish selected packages
        timeout-minutes: 20
        env:
          RELEASE_PLAN_JSON: ${{ steps.publish-plan.outputs.plan_json }}
        run: |
          node --input-type=module <<'NODE'
          import { spawnSync } from 'node:child_process'

          const releasePlan = JSON.parse(process.env.RELEASE_PLAN_JSON ?? '[]')

          if (releasePlan.length === 0) {
            throw new Error('Publish plan is empty.')
          }

          for (const candidate of releasePlan) {
            const args = ['publish', candidate.localSpec, '--tag', 'next', '--provenance']

            if (candidate.scoped) {
              args.push('--access', 'public')
            }

            console.log(`Publishing ${candidate.name}@${candidate.version}`)
            const result = spawnSync('npm', args, { stdio: 'inherit' })

            if (result.status !== 0) {
              process.exit(result.status ?? 1)
            }
          }
          NODE
